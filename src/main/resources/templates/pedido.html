<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realizar Pedido - Tienda Web Express</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <a th:href="@{/}" class="logo">Tienda Web <span>Express</span></a>
                <ul class="nav-links">
                    <li><a th:href="@{/}">Inicio</a></li>
                    <li><a th:href="@{/productos}">Catálogo</a></li>
                    <li><a th:href="@{/carrito}">Carrito <span class="cart-badge" th:if="${session.carrito != null and not #lists.isEmpty(session.carrito)}" th:text="${#lists.size(session.carrito)}">0</span></a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container">
        <h1>Formulario de Pedido</h1>

        <div class="order-container">
            <div class="order-product-summary">
                <h3>Resumen del Producto</h3>
                <div class="summary-item">
                    <img th:src="@{'/img/' + ${producto.imagen}}" th:alt="${producto.nombre}" onerror="this.src='https://via.placeholder.com/100'">
                    <div>
                        <p><strong th:text="${producto.nombre}">Producto</strong></p>
                        <p>Precio: <span th:text="'$' + ${producto.precio}">$0.00</span></p>
                    </div>
                </div>
            </div>

            <form th:action="@{/pedido}" th:object="${pedido}" method="post" class="order-form" onsubmit="return validarFormulario()">
                <input type="hidden" th:field="*{productoId}">
                
                <div th:if="${error}" class="error-alert" th:text="${error}">Error</div>

                <div class="form-group">
                    <label for="nombreCliente">Nombre Completo:</label>
                    <input type="text" id="nombreCliente" th:field="*{nombreCliente}" placeholder="Tu nombre">
                    <span class="field-error" th:if="${#fields.hasErrors('nombreCliente')}" th:errors="*{nombreCliente}"></span>
                </div>

                <div class="form-group">
                    <label for="correo">Correo Electrónico:</label>
                    <input type="email" id="correo" th:field="*{correo}" placeholder="ejemplo@correo.com">
                    <span class="field-error" th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}"></span>
                </div>

                <div class="form-group">
                    <label for="cantidad">Cantidad:</label>
                    <input type="number" id="cantidad" th:field="*{cantidad}" min="1" th:max="${producto.stock}">
                    <span class="field-error" th:if="${#fields.hasErrors('cantidad')}" th:errors="*{cantidad}"></span>
                </div>

                <div class="form-group">
                    <label for="comentario">Dirección / Comentarios:</label>
                    <textarea id="comentario" th:field="*{comentario}" rows="4" placeholder="Indica tu dirección o algún comentario adicional"></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Confirmar Pedido</button>
                    <a th:href="@{/productos/{id}(id=${producto.id})}" class="btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Tienda Web Express - Proyecto Universitario</p>
        </div>
    </footer>

    <script th:src="@{/js/app.js}"></script>
</body>
</html>
