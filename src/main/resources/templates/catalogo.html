<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Tienda Web Express</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <a th:href="@{/}" class="logo">Tienda Web <span>Express</span></a>
                <ul class="nav-links">
                    <li><a th:href="@{/}">Inicio</a></li>
                    <li><a th:href="@{/productos}" class="active">Catálogo</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container">
        <h1>Nuestro Catálogo</h1>

        <div class="filters">
            <h3>Filtrar por Categoría:</h3>
            <div class="category-list">
                <a th:href="@{/productos}" 
                   th:class="${categoriaSeleccionada == null} ? 'btn-filter active' : 'btn-filter'">Todas</a>
                <a th:each="cat : ${categorias}" 
                   th:href="@{/productos(categoriaId=${cat.id})}"
                   th:text="${cat.nombre}"
                   th:class="${categoriaSeleccionada == cat.id} ? 'btn-filter active' : 'btn-filter'">Categoría</a>
            </div>
        </div>

        <div class="product-grid">
            <div th:each="prod : ${productos}" class="product-card">
                <img th:src="@{'/img/' + ${prod.imagen}}" th:alt="${prod.nombre}" onerror="this.src='https://via.placeholder.com/200'">
                <div class="product-info">
                    <span class="category-tag" th:text="${prod.categoriaNombre}">Categoría</span>
                    <h3 th:text="${prod.nombre}">Nombre Producto</h3>
                    <p class="price" th:text="'$' + ${prod.precio}">$0.00</p>
                    <a th:href="@{/productos/{id}(id=${prod.id})}" class="btn-secondary">Ver Detalle</a>
                </div>
            </div>
            <div th:if="${#lists.isEmpty(productos)}" class="no-results">
                <p>No se encontraron productos en esta categoría.</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Tienda Web Express - Proyecto Universitario</p>
        </div>
    </footer>

    <script th:src="@{/js/app.js}"></script>
</body>
</html>
