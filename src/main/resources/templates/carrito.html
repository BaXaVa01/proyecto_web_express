<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Carrito - Tienda Web Express</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <a th:href="@{/}" class="logo">Tienda Web <span>Express</span></a>
                <ul class="nav-links">
                    <li><a th:href="@{/}">Inicio</a></li>
                    <li><a th:href="@{/productos}">Catálogo</a></li>
                    <li><a th:href="@{/carrito}" class="active">Carrito <span class="cart-badge" th:if="${session.carrito != null and not #lists.isEmpty(session.carrito)}" th:text="${#lists.size(session.carrito)}">0</span></a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container">
        <h1>Tu Carrito de Compras</h1>

        <div th:if="${#lists.isEmpty(items)}" class="empty-cart-message">
            <p>Tu carrito está vacío.</p>
            <a th:href="@{/productos}" class="btn-primary">Ir al catálogo</a>
        </div>

        <div th:if="${not #lists.isEmpty(items)}" class="cart-container">
            <div class="cart-table-wrapper">
                <table class="cart-table">
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Precio</th>
                            <th>Cantidad</th>
                            <th>Subtotal</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${items}">
                            <td class="product-td">
                                <div class="product-item-info">
                                    <img th:src="@{'/img/' + ${item.imagen}}" th:alt="${item.nombre}" class="cart-img" onerror="this.src='https://via.placeholder.com/50'">
                                    <span th:text="${item.nombre}">Nombre</span>
                                </div>
                            </td>
                            <td th:text="'$' + ${item.precio}">$0.00</td>
                            <td th:text="${item.cantidad}">1</td>
                            <td th:text="'$' + ${item.subtotal}">$0.00</td>
                            <td>
                                <form th:action="@{/carrito/eliminar}" method="post">
                                    <input type="hidden" name="productoId" th:value="${item.productoId}">
                                    <button type="submit" class="btn-delete">Eliminar</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="cart-summary">
                <h3>Resumen del Pedido</h3>
                <div class="summary-row">
                    <span>Total General:</span>
                    <span class="total-price" th:text="'$' + ${total}">$0.00</span>
                </div>
                <div class="summary-actions">
                    <form th:action="@{/carrito/finalizar}" method="post">
                        <button type="submit" class="btn-primary btn-block">Finalizar Pedido</button>
                    </form>
                    <a th:href="@{/productos}" class="btn-secondary btn-block">Seguir Comprando</a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Tienda Web Express - Proyecto Universitario</p>
        </div>
    </footer>

    <script th:src="@{/js/app.js}"></script>
</body>
</html>
