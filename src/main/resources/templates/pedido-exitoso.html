<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Exitoso - Tienda Web Express</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="container">
                <a th:href="@{/}" class="logo">Tienda Web <span>Express</span></a>
            </div>
        </nav>
    </header>

    <main class="container text-center">
        <div class="success-container">
            <div class="success-icon">✓</div>
            <h1>¡Pedido Realizado con Éxito!</h1>
            <p>Gracias, <strong th:text="${pedidoConfirmado.nombreCliente}">Cliente</strong>. Hemos recibido tu pedido.</p>
            
            <div class="order-details">
                <p><strong>N° de Pedido:</strong> <span th:text="${pedidoConfirmado.id}">0</span></p>
                <p><strong>Total:</strong> <span th:text="'$' + ${pedidoConfirmado.total}">$0.00</span></p>
                <p><strong>Fecha:</strong> <span th:text="${#temporals.format(pedidoConfirmado.fechaPedido, 'dd/MM/yyyy HH:mm')}">Fecha</span></p>
            </div>

            <p>Se ha enviado una confirmación a: <em th:text="${pedidoConfirmado.correo}">correo@ejemplo.com</em></p>
            
            <div class="actions">
                <a th:href="@{/}" class="btn-primary">Volver al Inicio</a>
                <a th:href="@{/productos}" class="btn-secondary">Seguir Comprando</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Tienda Web Express - Proyecto Universitario</p>
        </div>
    </footer>

    <script th:src="@{/js/app.js}"></script>
</body>
</html>
